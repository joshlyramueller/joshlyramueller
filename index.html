<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joshua Mueller</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a84c;
      --gold-dim: rgba(201, 168, 76, 0.6);
      --cream: #f0e8d8;
      --dark: #0a0705;
      --mid: rgba(10, 7, 5, 0.55);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--dark);
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease, opacity 0.3s ease;
    }
    .cursor-ring {
      position: fixed;
      width: 36px;
      height: 36px;
      border: 1px solid var(--gold-dim);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.3s ease, height 0.3s ease;
    }

    /* Video container */
    .video-wrap {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .video-wrap iframe {
      position: absolute;
      top: 50%;
      left: 50%;
      /* 16:9 ratio, oversized to fill any screen */
      width: 177.78vh;
      height: 56.25vw;
      min-width: 100vw;
      min-height: 100vh;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: -1;
    }

    /* Dark cinematic overlays */
    .overlay-vignette {
      position: fixed;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(5, 3, 2, 0.75) 100%);
    }

    .overlay-gradient {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        linear-gradient(to bottom,
          rgba(5, 3, 2, 0.6) 0%,
          rgba(5, 3, 2, 0.2) 30%,
          rgba(5, 3, 2, 0.2) 70%,
          rgba(5, 3, 2, 0.85) 100%
        );
    }

    /* Grain texture overlay */
    .overlay-grain {
      position: fixed;
      inset: 0;
      z-index: 3;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' nu[...]");
      background-repeat: repeat;
      background-size: 128px 128px;
      pointer-events: none;
    }

    /* Decorative corner lines */
    .corner {
      position: fixed;
      z-index: 5;
      width: 60px;
      height: 60px;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }
    .corner::before,
    .corner::after {
      content: '';
      position: absolute;
      background: var(--gold-dim);
    }
    .corner::before { width: 1px; height: 100%; }
    .corner::after  { width: 100%; height: 1px; }

    .corner-tl { top: 32px; left: 32px; animation-delay: 1.8s; }
    .corner-tl::before { top: 0; left: 0; }
    .corner-tl::after  { top: 0; left: 0; }

    .corner-tr { top: 32px; right: 32px; animation-delay: 1.9s; }
    .corner-tr::before { top: 0; right: 0; left: auto; }
    .corner-tr::after  { top: 0; right: 0; left: auto; }

    .corner-bl { bottom: 32px; left: 32px; animation-delay: 2.0s; }
    .corner-bl::before { bottom: 0; top: auto; left: 0; }
    .corner-bl::after  { bottom: 0; top: auto; left: 0; }

    .corner-br { bottom: 32px; right: 32px; animation-delay: 2.1s; }
    .corner-br::before { bottom: 0; top: auto; right: 0; left: auto; }
    .corner-br::after  { bottom: 0; top: auto; right: 0; left: auto; }

    /* Main content */
    .hero {
      position: fixed;
      inset: 0;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .eyebrow {
      font-family: 'Times New Roman', Times, serif;
      font-weight: 400;
      font-size: clamp(0.6rem, 1.2vw, 0.75rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s ease forwards;
      animation-delay: 0.6s;
    }

    .divider {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 1.4rem auto;
      animation: expandWidth 1.2s ease forwards;
      animation-delay: 1.0s;
    }

    .name {
      font-family: 'Times New Roman', Times, serif;
      font-weight: 600;
      font-size: clamp(2.8rem, 8vw, 7rem);
      color: var(--cream);
      letter-spacing: 0.12em;
      line-height: 1;
      opacity: 0;
      transform: translateY(20px);
      animation: riseIn 1.2s ease forwards;
      animation-delay: 0.3s;
      text-shadow: 0 0 80px rgba(201,168,76,0.15);
    }

    .divider2 {
      width: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      margin: 1.4rem auto;
      animation: expandWidth 1.2s ease forwards;
      animation-delay: 1.2s;
    }

    .tagline {
      font-family: 'Times New Roman', Times, serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1rem, 2.4vw, 1.5rem);
      color: rgba(240, 232, 216, 0.75);
      letter-spacing: 0.06em;
      max-width: 560px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s ease forwards;
      animation-delay: 1.4s;
    }

    .cta-wrap {
      margin-top: 3rem;
      opacity: 0;
      transform: translateY(12px);
      animation: riseIn 1s ease forwards;
      animation-delay: 1.8s;
      display: flex;
      gap: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cta {
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.9rem 2.4rem;
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      position: relative;
      overflow: hidden;
      transition: color 0.4s ease, border-color 0.4s ease;
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--gold);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1);
      z-index: -1;
    }

    .cta:hover {
      color: var(--dark);
      border-color: var(--gold);
    }

    .cta:hover::before {
      transform: translateX(0);
    }

    .cta-secondary {
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-dim);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.3s ease, border-color 0.3s ease;
      padding-bottom: 2px;
    }

    .cta-secondary:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }

    /* Bottom credit line */
    .bottom-bar {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 6;
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.35);
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 2.4s;
      white-space: nowrap;
    }

    /* Scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      right: 2.5rem;
      z-index: 6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: fadeIn 1s ease forwards;
      animation-delay: 2.6s;
    }

    .scroll-hint span {
      font-family: 'Times New Roman', Times, serif;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(201, 168, 76, 0.4);
      writing-mode: vertical-rl;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold-dim), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
      animation-delay: 3s;
    }

    /* Keyframes */
    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes expandWidth {
      to { width: min(320px, 60vw); }
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.4; transform: scaleY(1); }
      50% { opacity: 1; transform: scaleY(1.15); }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .corner { width: 36px; height: 36px; }
      .corner-tl, .corner-tr { top: 20px; }
      .corner-bl, .corner-br { bottom: 20px; }
      .corner-tl, .corner-bl { left: 20px; }
      .corner-tr, .corner-br { right: 20px; }
      .scroll-hint { display: none; }
      .bottom-bar { font-size: 0.45rem; }
    }
  </style>
</head>
<body>

  <!-- Custom cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <!-- YouTube video background -->
  <div class="video-wrap">
    <iframe
      id="yt-player"
      src="https://www.youtube.com/embed/MHFK4mp3JB4?si=zCVMbUmExdn-111K&autoplay=1&mute=1&loop=1&playlist=MHFK4mp3JB4"
      title="Joshua Mueller Reel"
      frameborder="0"
      allow="autoplay; encrypted-media"
      allowfullscreen
    ></iframe>
  </div>

  <!-- Overlays -->
  <div class="overlay-vignette"></div>
  <div class="overlay-gradient"></div>
  <div class="overlay-grain"></div>

  <!-- Corner decorations -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Hero content -->
  <div class="hero">
    <p class="eyebrow">Artist &nbsp;·&nbsp; Designer &nbsp;·&nbsp; Creator</p>
    <div class="divider"></div>
    <h1 class="name">Joshua Mueller</h1>
    <div class="divider2"></div>
    <p class="tagline">Building my own world — Analog to Digital,<br>I'm a Josh of All Trades.</p>
    <div class="cta-wrap">
      <a class="cta" href="https://joshuamueller.myportfolio.com/work" target="_blank">View Portfolio</a>
      <a class="cta-secondary" href="https://joshuamueller.myportfolio.com/contact" target="_blank">Get in Touch</a>
    </div>
  </div>

  <!-- Bottom bar -->
  <p class="bottom-bar">© 2026 Joshua Mueller &nbsp;·&nbsp; Digital Artist &nbsp;·&nbsp; Pensacola, FL</p>

  <!-- Scroll hint -->
  <div class="scroll-hint">
    <span>Reel</span>
    <div class="scroll-line"></div>
  </div>

  <script>
    // Custom cursor
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    // Lag the ring slightly
    function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) *.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();

    // Hover effects on links
    document.querySelectorAll('a').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.style.width = '14px';
        cursor.style.height = '14px';
        ring.style.width = '52px';
        ring.style.height = '52px';
      });
      el.addEventListener('mouseleave', () => {
        cursor.style.width = '8px';
        cursor.style.height = '8px';
        ring.style.width = '36px';
        ring.style.height = '36px';
      });
    });
  </script>
</body>
</html>
